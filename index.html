<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>溪北國小 - AI 口說出題系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    /* === 核心樣式 === */
    :root { --bg-deep: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9; --text-sub: #94a3b8; --accent: #3b82f6; --success: #10b981; --fail: #ef4444; }
    body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Zen Maru Gothic', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    
    /* 登入區 */
    #login-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .login-card { background: var(--card-bg); padding: 40px; border-radius: 24px; text-align: center; border: 1px solid #334155; width: 85%; max-width: 320px; box-shadow: 0 0 50px rgba(59, 130, 246, 0.2); }
    .login-input { width: 100%; padding: 14px; background: #0f172a; color: white; border: 2px solid #334155; border-radius: 12px; margin-bottom: 20px; font-size: 1.1rem; text-align: center; outline: none; font-family: inherit; box-sizing: border-box;}
    .start-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
    .start-btn:active { transform: scale(0.95); }

    /* 主容器 */
    .container { width: 95%; max-width: 600px; height: 95vh; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
    
    /* 頭部資訊：包含語音選擇 */
    .header-panel { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(30, 41, 59, 0.8); border-radius: 16px; border: 1px solid #334155; box-sizing: border-box; min-height: 70px; backdrop-filter: blur(10px); gap: 10px; }
    .header-info { display: flex; flex-direction: column; align-items: flex-start; flex: 1; overflow: hidden; }
    .header-label { font-size: 0.75rem; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; }
    .header-value { font-size: 1rem; font-weight: bold; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    
    /* 語音選擇器 */
    .voice-select-container { flex: 1; max-width: 120px; }
    #voice-select { width: 100%; background: #0f172a; color: white; border: 1px solid #334155; padding: 5px; border-radius: 8px; font-size: 0.8rem; outline: none; }

    .progress-pill { background: #0f172a; padding: 5px 12px; border-radius: 20px; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: bold; border: 1px solid #334155; white-space: nowrap; }

    /* 進度條 (限時模式) */
    #timer-wrapper { width: 100%; height: 6px; background: #334155; border-radius: 3px; margin-top: 15px; display: none; overflow: hidden; position: relative; }
    #timer-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #10b981, #facc15, #ef4444); transition: width 0.1s linear; }

    /* 題目卡片 */
    .main-card { flex: 1; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; margin: 10px 0; }
    
    .sentence-container { display: block; text-align: center; font-size: clamp(1.4rem, 5vw, 2.5rem); font-weight: 700; line-height: 1.4; margin-bottom: 25px; padding: 0 10px; transition: all 0.3s; font-family: 'Rajdhani', sans-serif; cursor: default; }
    
    /* 盲測特效 */
    .sentence-container.blind { filter: blur(8px); opacity: 0.5; user-select: none; }
    .sentence-container.blind.revealed { filter: none; opacity: 1; }

    .word-span { display: inline-block; padding: 2px 6px; border-radius: 8px; transition: all 0.2s; margin: 2px; border: 2px solid transparent; }
    .word-span.clickable { cursor: pointer; border-bottom: 2px dotted #334155; }
    .word-span.clickable:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
    
    .word-span.active-word { background-color: #facc15 !important; color: #000 !important; transform: scale(1.15); box-shadow: 0 0 20px rgba(250, 204, 21, 0.6); z-index: 10; position: relative; border-color: white; }
    .word-span.correct { color: var(--success); text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
    .word-span.wrong { color: var(--fail); text-decoration: line-through; opacity: 0.6; }

    .translation { font-size: clamp(1rem, 3.5vw, 1.3rem); color: var(--text-sub); text-align: center; min-height: 1.5em; font-weight: 500; }
    .feedback-box { min-height: 30px; margin-top: 15px; font-size: 0.95rem; color: #94a3b8; font-style: italic; }

    .score-circle { width: 110px; height: 110px; border-radius: 50%; border: 6px solid #334155; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; font-weight: bold; position: absolute; top: -20px; background: var(--bg-deep); z-index: 20; opacity: 0; transform: scale(0.5); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-family: 'Rajdhani', sans-serif; }
    .score-circle.show { opacity: 1; transform: scale(1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .score-high { border-color: var(--success); color: var(--success); }
    .score-mid { border-color: #facc15; color: #facc15; }
    .score-low { border-color: var(--fail); color: var(--fail); }

    /* 控制區 */
    .controls { width: 100%; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
    
    .audio-controls { display: flex; align-items: center; justify-content: center; gap: 15px; background: rgba(30, 41, 59, 0.6); padding: 10px; border-radius: 16px; border: 1px solid #334155; }
    
    .icon-btn { background: #334155; border: none; color: var(--text-main); width: 42px; height: 42px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .icon-btn:active { transform: scale(0.9); background: #475569; }
    
    .speed-control { display: flex; align-items: center; gap: 8px; flex: 1; max-width: 200px; }
    input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; background: #475569; border-radius: 3px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; transition: transform 0.1s; }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .speed-label { font-size: 0.8rem; color: var(--text-sub); width: 35px; text-align: center; font-family: 'Rajdhani', sans-serif; }

    .hidden { display: none !important; }

    #mic-btn { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border: none; padding: 18px; font-size: 1.3rem; border-radius: 16px; cursor: pointer; width: 100%; font-weight: bold; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); font-family: 'Rajdhani', sans-serif; display: flex; align-items: center; justify-content: center; gap: 10px; }
    #mic-btn.listening { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

    .nav-buttons { display: flex; gap: 10px; display: none; }
    .nav-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .btn-retry { background: #475569; }
    .btn-next { background: #10b981; }

    .mode-badge { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: #0f172a; padding: 6px 16px; border-radius: 30px; font-size: 0.85rem; z-index: 50; border: 1px solid #334155; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); white-space: nowrap; }
  </style>
</head>
<body>
  <div class="mode-badge" id="mode-badge">系統連線中...</div>

  <div id="login-overlay">
    <div class="login-card">
      <div style="font-size:3rem; margin-bottom:10px;">🧬</div>
      <h2 style="margin:0 0 20px 0; color:white;">學生登入</h2>
      <input type="text" id="student-name" class="login-input" placeholder="請輸入姓名 / 座號">
      <button class="start-btn" onclick="startGame()" id="start-btn" disabled>正在與雲端連線... 🚀</button>
    </div>
  </div>

  <div class="container">
    <div class="header-panel">
      <div class="header-info">
        <div class="header-label">UNIT</div>
        <div id="current-sheet-display" class="header-value">...</div>
      </div>
      
      <div class="voice-select-container">
         <select id="voice-select" onchange="updateVoice()"><option>Loading...</option></select>
      </div>

      <div class="progress-pill">
        <span id="current-index">0</span>/<span id="total-count">0</span>
      </div>
    </div>
    
    <div id="timer-wrapper"><div id="timer-bar"></div></div>

    <div class="main-card">
      <div id="score-display" class="score-circle">100</div>
      <div id="sentence-area" class="sentence-container"></div>
      <div id="translation-area" class="translation">...</div>
      <div id="feedback-area" class="feedback-box"></div>
    </div>

    <div class="controls" id="controls-area">
      
      <div class="audio-controls" id="audio-panel">
        <button id="btn-speak" class="icon-btn" onclick="playWholeSentence()">🔊</button>
        
        <div class="speed-control" id="speed-slider-area">
            <span style="font-size:0.8rem">🐢</span>
            <input type="range" id="rate-slider" min="0.5" max="1.5" step="0.1" value="1" oninput="updateRateLabel()">
            <span id="rate-label" class="speed-label">1.0x</span>
        </div>

        <button id="btn-hint" class="icon-btn" onclick="showFirstLetterHint()" style="display:none">💡</button>
      </div>

      <button id="mic-btn" onclick="toggleSpeech()">
        <span>🎙️ START SPEAKING</span>
      </button>

      <div class="nav-buttons" id="practice-actions">
        <button class="nav-btn btn-retry" onclick="resetCurrentQuestion()">🔄 重試</button>
        <button class="nav-btn btn-next" onclick="nextQuestion()">下一題 ➡️</button>
      </div>
    </div>
  </div>

  <audio id="sfx-success" src="https://actions.google.com/sounds/v1/cartoon/magic_chime.ogg"></audio>
  <audio id="sfx-fail" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>

  <script>
    // ==========================================
    // ⚠️ 老師請注意：請將下方網址換成你的 GAS 網頁應用程式部署網址
    // ==========================================
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyEq9nvNpkxhkNimWlPiKfmFQJJmzpdFJyUJwbYbRdt3YJw69cPzpLtFGMglDAvF7VU/exec"; 
    // 例如："https://script.google.com/macros/s/AKfycb.../exec"

    // 從網址列抓取參數 (取代原本 GAS 範本傳遞)
    const urlParams = new URLSearchParams(window.location.search);
    const TARGET_SHEET = urlParams.get('sheet') || "";
    const QUESTION_COUNT = urlParams.get('n') || "all";
    const IS_RANDOM = urlParams.get('r') || "false";

    let quizData=[], currentIndex=0, recognition, isListening=false, voices=[], studentName="", questionMaxScores=[], currentSheetName="", appMode="PRACTICE";
    let timerInterval, timeLeft=10, TOTAL_TIME=10;
    let selectedVoice = null;

    window.onload = function() {
      // 確保語音載入
      window.speechSynthesis.onvoiceschanged = initVoices;
      initVoices();

      // ✨ 改用 fetch 呼叫 GAS API 取得資料
      fetch(GAS_API_URL + "?action=getInitData")
        .then(res => res.json())
        .then(data => {
          appMode = data.mode || "PRACTICE"; 
          updateModeUI(appMode);
          
          // 取得模式後，接著取得題目
          return fetch(`${GAS_API_URL}?action=getSentences&sheet=${encodeURIComponent(TARGET_SHEET)}&n=${QUESTION_COUNT}&r=${IS_RANDOM}`);
        })
        .then(res => res.json())
        .then(data => {
          initData(data);
          // 啟用開始按鈕
          let startBtn = document.getElementById('start-btn');
          startBtn.innerText = "開始練習 🚀";
          startBtn.disabled = false;
        })
        .catch(err => {
          alert("無法連線至雲端題庫，請檢查 GAS_API_URL 是否正確，或確認網頁是否有網路連線。\n錯誤訊息：" + err);
          document.getElementById('mode-badge').innerText = "連線失敗 ❌";
        });
    };

    function updateRateLabel() {
      document.getElementById('rate-label').innerText = document.getElementById('rate-slider').value + "x";
    }

    // ✨✨ 介面邏輯核心 ✨✨
    function updateModeUI(mode) {
      let b = document.getElementById('mode-badge');
      let t = document.getElementById('translation-area');
      let audioPanel = document.getElementById('audio-panel');
      let hintBtn = document.getElementById('btn-hint');
      let slider = document.getElementById('speed-slider-area');

      showElem(audioPanel); t.style.visibility = 'visible'; hideElem(hintBtn); showElem(slider);

      if (mode === 'EXAM') { 
        b.innerText = "🔴 正式測驗 Mode"; b.style.color="#ef4444"; b.style.borderColor="#ef4444";
        t.style.visibility = 'hidden'; 
        hideElem(audioPanel); 
      }
      else if (mode === 'BLIND') { 
        b.innerText = "🟣 聽音盲測 Mode"; b.style.color="#a855f7"; b.style.borderColor="#a855f7";
        showElem(hintBtn); 
      }
      else if (mode === 'SPEED') { 
        b.innerText = "🔵 限時挑戰 Mode"; b.style.color="#3b82f6"; b.style.borderColor="#3b82f6";
        hideElem(audioPanel); 
      }
      else { 
        b.innerText = "🟢 鼓勵練習 Mode"; b.style.color="#10b981"; b.style.borderColor="#10b981";
      }
    }

    function showElem(el) { if(typeof el === 'string') el=document.getElementById(el); el.classList.remove('hidden'); }
    function hideElem(el) { if(typeof el === 'string') el=document.getElementById(el); el.classList.add('hidden'); }

    function initData(res) {
      if (!res || !res.items || !res.items.length) { document.getElementById('sentence-area').innerText = "無資料"; return; }
      quizData = res.items; currentSheetName = res.name; currentIndex = 0;
      questionMaxScores = new Array(quizData.length).fill(0);
      document.getElementById('current-sheet-display').innerText = currentSheetName;
      document.getElementById('total-count').innerText = quizData.length;
      if (studentName) loadQuestion();
    }

    function startGame() {
      let n = document.getElementById('student-name').value.trim();
      if (!n) { alert("請輸入姓名"); return; }
      studentName = n; document.getElementById('login-overlay').style.display = 'none';
      if (quizData.length > 0) loadQuestion();
      setupSpeech();
    }

    function loadQuestion() {
      clearInterval(timerInterval);
      if (currentIndex >= quizData.length) { finishGame(); return; }
      
      document.getElementById('mic-btn').style.display = 'flex';
      document.getElementById('practice-actions').style.display = 'none';
      document.getElementById('score-display').className = 'score-circle';
      document.getElementById('feedback-area').innerHTML = "";
      document.getElementById('translation-area').innerText = quizData[currentIndex].chinese;
      document.getElementById('current-index').innerText = currentIndex + 1;
      
      let container = document.getElementById('sentence-area'); 
      container.innerHTML = "";
      container.className = 'sentence-container';
      
      if (appMode === 'BLIND') container.classList.add('blind');

      let words = quizData[currentIndex].english.split(/(\s+)/); 
      words.forEach(chunk => {
        if (chunk.trim().length === 0) container.appendChild(document.createTextNode(chunk));
        else {
          let s = document.createElement('span'); s.className = 'word-span'; s.innerText = chunk;
          if(appMode === 'PRACTICE' || appMode === 'BLIND') {
             s.classList.add('clickable');
             s.onclick = function() { speakText(chunk, getRate()); }; 
          }
          container.appendChild(s);
        }
      });

      if (appMode === 'SPEED') {
        let wordCount = quizData[currentIndex].english.split(" ").length;
        TOTAL_TIME = Math.max(5, Math.floor(wordCount * 0.8) + 3);
        startTimer();
      } else {
        document.getElementById('timer-wrapper').style.display = 'none';
      }
    }

    function showFirstLetterHint() {
      if (appMode !== 'BLIND') return;
      let container = document.getElementById('sentence-area');
      container.classList.remove('blind');
      setTimeout(() => { container.classList.add('blind'); }, 400); 
    }

    function startTimer() {
      timeLeft = TOTAL_TIME;
      document.getElementById('timer-wrapper').style.display = 'block';
      let bar = document.getElementById('timer-bar'); bar.style.width = '100%';
      timerInterval = setInterval(() => {
        timeLeft -= 0.1; bar.style.width = (timeLeft / TOTAL_TIME * 100) + "%";
        if (timeLeft <= 0) { clearInterval(timerInterval); handleTimeOut(); }
      }, 100);
    }

    function handleTimeOut() {
      document.getElementById('mic-btn').style.display = 'none';
      document.getElementById('feedback-area').innerHTML = "<span style='color:red'>⏰ Time's up!</span>";
      document.getElementById('score-display').innerText = "0";
      document.getElementById('score-display').classList.add('score-low', 'show');
      playSound('fail');
      setTimeout(() => { currentIndex++; loadQuestion(); }, 2000);
    }

    function resetCurrentQuestion() { loadQuestion(); }
    function nextQuestion() { currentIndex++; loadQuestion(); }

    function initVoices() {
      voices = window.speechSynthesis.getVoices();
      let select = document.getElementById('voice-select');
      select.innerHTML = "";
      
      let enVoices = voices.filter(v => v.lang.includes('en'));
      if(enVoices.length === 0) {
        let o = document.createElement("option"); o.text = "System Default"; select.add(o);
        return;
      }

      enVoices.forEach((v, i) => {
        let option = document.createElement("option");
        option.text = v.name.replace(/Microsoft|Google/g, '').trim(); 
        option.value = v.name;
        if (v.name.includes('Google US')) option.selected = true;
        select.add(option);
      });
      updateVoice();
    }

    function updateVoice() {
      let name = document.getElementById('voice-select').value;
      selectedVoice = voices.find(v => v.name === name);
    }

    function getRate() { return parseFloat(document.getElementById('rate-slider').value); }
    function playWholeSentence() { speakText(quizData[currentIndex].english, getRate()); }

    function speakText(text, rate) {
      window.speechSynthesis.cancel();
      let u = new SpeechSynthesisUtterance(text); 
      u.lang = 'en-US'; 
      u.rate = rate;
      if (selectedVoice) u.voice = selectedVoice;
      window.speechSynthesis.speak(u);
    }

    function setupSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
          alert("你的瀏覽器不支援語音辨識！請使用 Chrome。");
          return;
      }
      recognition = new SpeechRecognition(); 
      recognition.lang = 'en-US'; 
      recognition.interimResults = false;
      recognition.onstart = () => { isListening = true; document.getElementById('mic-btn').classList.add('listening'); };
      recognition.onend = () => { isListening = false; document.getElementById('mic-btn').classList.remove('listening'); };
      recognition.onresult = (e) => calculateScore(e.results[0][0].transcript);
    }
    
    function toggleSpeech() { if(isListening) recognition.stop(); else recognition.start(); }

    function calculateScore(userSaid) {
      clearInterval(timerInterval);
      document.getElementById('feedback-area').innerHTML = "聽見：<span style='color:#3b82f6'>" + userSaid + "</span>";
      
      let target = quizData[currentIndex].english; 
      let cleanTarget = normalize(target); 
      let cleanUser = normalize(userSaid);
      let sim = similarity(cleanUser, cleanTarget); 
      let score = Math.round(sim * 100);
      if (cleanUser.includes(cleanTarget) && score < 80) score = 90;
      
      if (appMode === 'PRACTICE') { if (score > questionMaxScores[currentIndex]) questionMaxScores[currentIndex] = score; }
      else { questionMaxScores[currentIndex] = score; }

      checkDiff(cleanTarget, cleanUser);
      
      if (appMode === 'BLIND') {
        let c = document.getElementById('sentence-area'); c.classList.remove('blind'); c.classList.add('revealed');
      }
      showScoreResult(score);
    }

    function showScoreResult(score) {
      let el = document.getElementById('score-display');
      el.innerText = score; el.classList.remove('score-high','score-mid','score-low');
      if (score>=80) { el.classList.add('score-high'); playSound('success'); confetti({origin:{y:0.7}}); }
      else if (score>=50) { el.classList.add('score-mid'); playSound('fail'); }
      else { el.classList.add('score-low'); playSound('fail'); }
      el.classList.add('show');
      document.getElementById('mic-btn').style.display = 'none';

      if (appMode === 'PRACTICE') { document.getElementById('practice-actions').style.display = 'flex'; }
      else { setTimeout(() => { currentIndex++; loadQuestion(); }, 3000); }
    }

    function normalize(t){return t.toString().toLowerCase().replace(/\bokay\b/g,"ok").replace(/[:\-]/g," ").replace(/[^a-z0-9\s]/g,"").split(/\s+/).map(w=>({'0':'zero','1':'one','2':'two','3':'three','4':'four','5':'five','6':'six','7':'seven','8':'eight','9':'nine','10':'ten','11':'eleven','12':'twelve','15':'fifteen','20':'twenty','30':'thirty','40':'forty','50':'fifty'}[w]||w)).join(' ').trim();}
    function checkDiff(t,u){let uw=u.split(" ");document.querySelectorAll('.word-span').forEach(s=>{let w=normalize(s.innerText);if(uw.includes(w)){s.classList.add('correct');uw.splice(uw.indexOf(w),1)}else{s.classList.add('wrong');}});}
    function similarity(s1,s2){let l=s1.length>s2.length?s1:s2,s=s1.length>s2.length?s2:s1;if(l.length==0)return 1.0;return(l.length-editDistance(l,s))/parseFloat(l.length);}
    function editDistance(s1,s2){let c=new Array();for(let i=0;i<=s1.length;i++){let l=i;for(let j=0;j<=s2.length;j++){if(i==0)c[j]=j;else if(j>0){let n=c[j-1];if(s1.charAt(i-1)!=s2.charAt(j-1))n=Math.min(Math.min(n,l),c[j])+1;c[j-1]=l;l=n;}}if(i>0)c[s2.length]=l;}return c[s2.length];}
    function playSound(id){document.getElementById('sfx-'+id).play().catch(()=>{});}
    
    // ✨✨ 修正：使用 fetch 寫回成績 ✨✨
    function finishGame(){
      document.getElementById('controls-area').style.display = 'none';
      
      let sum=questionMaxScores.reduce((a,b)=>a+b,0), avg=Math.round(sum/quizData.length), det=questionMaxScores.join(", ");
      let mainCard = document.querySelector('.main-card');
      mainCard.innerHTML=`<h1 style='font-size:2rem'>🎉 測驗結束 🎉</h1><h2 style='font-size:3rem;color:${avg>=60?'#10b981':'#ef4444'}'>${avg} 分</h2><p id="upload-msg" style="color:#94a3b8">雲端成績上傳中...</p>`; confetti();
      
      fetch(GAS_API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: "saveScore",
          name: studentName,
          sheetName: currentSheetName,
          score: avg,
          detail: det,
          mode: appMode
        }),
        headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
           document.getElementById("upload-msg").innerHTML = "✅ 成績已安全送達試算表！";
           document.getElementById("upload-msg").style.color = "#10b981";
        } else {
           alert("儲存失敗：" + data.message);
        }
      })
      .catch(err => alert("成績傳送發生錯誤：" + err));
    }
  </script>
